<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>메키 :: 파티 전투력 스캐너</title>

<style>
body {
    margin:0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg,#1e1e2f,#23243a);
    color: #f1f1f1;
    padding: 40px 20px;
}

.container {
    max-width: 600px;
    margin: auto;
}

h1 {
    text-align:center;
    margin-bottom:30px;
    font-weight:600;
}

button {
    display:block;
    margin:0 auto;
    background:#4e73ff;
    border:none;
    padding:12px 28px;
    border-radius:10px;
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.2s;
}

button:hover {
    background:#3d5de0;
}

button:disabled {
    background:gray;
}

.status {
    text-align:center;
    margin-top:15px;
    opacity:0.8;
}

.card {
    margin-top:30px;
    background:#2b2d45;
    border-radius:15px;
    padding:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

.user-row {
    display:flex;
    justify-content:space-between;
    padding:14px 10px;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.user-row:last-child {
    border-bottom:none;
}

.username {
    font-weight:500;
}

.power {
    font-weight:600;
    letter-spacing:0.5px;
}

.summary {
    margin-top:20px;
    background:#1f2033;
    padding:15px;
    border-radius:10px;
    text-align:center;
    font-size:14px;
}
.summary div {
    margin:5px 0;
}

.download-section {
    margin-top: 50px;
}

.download-card {
    background: #252744;
    border-radius: 18px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: 0.25s;
}

.download-card:hover {
    transform: translateY(-4px);
}

.download-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 10px;
}

.download-desc {
    font-size: 13px;
    opacity: 0.75;
    margin-bottom: 20px;
    line-height: 1.6;
}

.download-btn {
    display: inline-block;
    padding: 12px 24px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    background: linear-gradient(135deg,#4e73ff,#6a5cff);
    color: white;
    transition: 0.2s;
}

.download-btn:hover {
    background: linear-gradient(135deg,#3d5de0,#5a4fe0);
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">
    <h1>파티원 전투력</h1>

    <button id="scanBtn" onclick="requestScan()">스캔 요청</button>
    <div class="status" id="status">대기 중...</div>

    <div class="card" id="resultCard" style="display:none;">
        <div id="resultBody"></div>
        <div class="summary" id="summaryBox"></div>
    </div>
</div>
<div class="download-section">
    <div class="download-card">
        <div class="download-title">📦 파티 스캐너 프로그램</div>
        <div class="download-desc">
            LD9Player 실행 후 백그라운드에서 대기합니다.<br>
            관리자 권한으로 실행해주세요.
        </div>

        <a href="https://github.com/Sukryak/ms-idle-battle-power/releases/download/ms_idle/scanner.exe"
           class="download-btn"
           target="_blank">
            ⬇ 프로그램 다운로드 (v1.0)
        </a>
    </div>
</div>
<script>

const API_URL = "https://msidlepower.netlify.app/.netlify/functions/manage";

function formatBattlePower(value) {
    const units = [
        { unit: "경", value: 1e16 },
        { unit: "조", value: 1e12 },
        { unit: "억", value: 1e8 },
        { unit: "만", value: 1e4 }
    ];

    let result = "";
    let remaining = value;

    for (const u of units) {
        if (remaining >= u.value) {
            const amount = Math.floor(remaining / u.value);
            result += amount.toLocaleString() + u.unit + " ";
            remaining %= u.value;
        }
    }

    return result || value.toLocaleString();
}

async function requestScan() {
    const btn = document.getElementById("scanBtn");
    const status = document.getElementById("status");

    btn.disabled = true;
    status.textContent = "PC에 스캔 명령 전송 중...";

    await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "REQUEST_SCAN" })
    });

    status.textContent = "스캔 진행 중...";
    await new Promise(r => setTimeout(r, 3000));

    checkResultLoop(0);
}

async function checkResultLoop(retry) {
    const status = document.getElementById("status");

    const res = await fetch(API_URL + "?type=data");
    const data = await res.json();

    if (data && data.length > 0) {
        renderUI(data);
        status.textContent = "스캔 완료!";
        document.getElementById("scanBtn").disabled = false;
    } else {
        if (retry < 5) {
            status.textContent = `데이터 대기 중... (${retry+1}/5)`;
            setTimeout(() => checkResultLoop(retry + 1), 1000);
        } else {
            status.textContent = "응답 시간 초과";
            document.getElementById("scanBtn").disabled = false;
        }
    }
}

function renderUI(data) {
    const body = document.getElementById("resultBody");
    const summary = document.getElementById("summaryBox");
    const card = document.getElementById("resultCard");

    body.innerHTML = "";
    card.style.display = "block";

    let total = 0;

    data.forEach(user => {
        total += user.battlepower;

        body.innerHTML += `
            <div class="user-row">
                <div class="username">${user.username}</div>
                <div class="power">${formatBattlePower(user.battlepower)}</div>
            </div>
        `;
    });

    const avg = Math.floor(total / data.length);

    summary.innerHTML = `
        <div>👥 파티 인원 : ${data.length}명</div>
        <div>⚡ 총 전투력 : ${formatBattlePower(total)}</div>
        <div>📊 평균 전투력 : ${formatBattlePower(avg)}</div>
    `;
}

</script>

</body>
</html>
