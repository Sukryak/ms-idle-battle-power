<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전투력 스캐너</title>
    <!-- 스타일 생략 (이전과 동일) -->
</head>
<body>

<div class="container">
    <h1>⚔️ 원격 전투력 스캐너</h1>
    
    <button id="scanBtn" onclick="requestScan()">스캔 요청 (Start Scan)</button>
    <div id="status">대기 중...</div>

    <table id="resultTable">
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
    // manage.js 주소
    const API_URL = "https://msidlepower.netlify.app/.netlify/functions/manage"

    async function requestScan() {
        const btn = document.getElementById('scanBtn');
        const status = document.getElementById('status');
        const tbody = document.getElementById('resultBody');

        btn.disabled = true;
        status.textContent = "1. PC에 스캔 명령 전송 중...";
        
        try {
            // 1. 명령 보내기 (POST)
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ action: "REQUEST_SCAN" })
            });

            status.textContent = "2. PC가 스캔 중입니다... (약 3~5초 대기)";
            
            // 2. EXE가 스캔할 시간 벌어주기 (3초 대기)
            await new Promise(r => setTimeout(r, 3000));

            // 3. 결과 가져오기 (GET)
            checkResultLoop(0);

        } catch (e) {
            status.textContent = "오류 발생: " + e;
            btn.disabled = false;
        }
    }

    async function checkResultLoop(retryCount) {
        const status = document.getElementById('status');
        const tbody = document.getElementById('resultBody');

        const res = await fetch(API_URL + "?type=data");
        const data = await res.json();

        // 데이터가 있고, 내용이 있다면 출력
        if (data && data.length > 0) {
            tbody.innerHTML = "";
            data.forEach((user, index) => {
                tbody.innerHTML += `<tr><td>${index+1}</td><td>${user.username}</td><td>${user.battlepower}</td></tr>`;
            });
            status.textContent = "스캔 완료!";
            document.getElementById('scanBtn').disabled = false;
        } else {
            // 아직 데이터가 안 왔으면 재시도
            if (retryCount < 5) {
                status.textContent = `데이터 대기 중... (${retryCount+1}/5)`;
                setTimeout(() => checkResultLoop(retryCount + 1), 1000);
            } else {
                status.textContent = "시간 초과: PC가 응답하지 않습니다. (EXE 켜져있나요?)";
                document.getElementById('scanBtn').disabled = false;
            }
        }
    }
</script>

</body>
</html>
